    - conditions_operator:
        name: ConditionsOperator
        members:
        - EQUALS
        - NOT_EQUALS
        - CONTAINS
        - NOT_CONTAINS
        - STARTS_WITH
        - NOT_STARTS_WITH
        - ENDS_WITH
        - NOT_ENDS_WITH
        - REGEX
        - NOT_REGEX
        values:
        - EQUALS
        - NOT_EQUALS
        - CONTAINS
        - NOT_CONTAINS
        - STARTS_WITH
        - NOT_STARTS_WITH
        - ENDS_WITH
        - NOT_ENDS_WITH
        - REGEX
        - NOT_REGEX
        description: Operator to use for comparing the `headerName` with `value`.
        member_descriptions:
          EQUALS: Performs an exact comparison between the header value and specified
            string. `string === value`.
          NOT_EQUALS: Ensures the header value does not exactly match the specified
            string. `string !== value`.
          CONTAINS: Checks if the header value contains the specified string as a
            substring. `string.includes()`.
          NOT_CONTAINS: Verifies the header value does not contain the specified string
            as a substring. `!string.includes()`.
          STARTS_WITH: Validates that the header value begins with the specified string.
            `string.startsWith()`.
          NOT_STARTS_WITH: Validates that the header value does not begin with the
            specified string. `!string.startsWith()`.
          ENDS_WITH: Confirms the header value ends with the specified string. `string.endsWith()`.
          NOT_ENDS_WITH: Confirms the header value does not end with the specified
            string. `!string.endsWith()`.
          REGEX: Evaluates if the header value matches the specified regular expression
            pattern. `regex.test()`.
          NOT_REGEX: Evaluates if the header value does not match the specified regular
            expression pattern. `!regex.test()`.
    - fingerprint:
        name: Fingerprint
        members:
        - CHROME
        - FIREFOX
        - SAFARI
        - IOS
        - ANDROID
        - EDGE
        - QQ
        - RANDOM
        - RANDOMIZED
        values:
        - chrome
        - firefox
        - safari
        - ios
        - android
        - edge
        - qq
        - random
        - randomized
        description: Simulate the TLS fingerprint using the `uTLS` library or it generate
          randomly.
        member_descriptions:
          CHROME: Simulate TLS fingerprint of the `Chrome` browser.
          FIREFOX: Simulate TLS fingerprint of the `Firefox` browser.
          SAFARI: Simulate TLS fingerprint of the `Safari` browser.
          IOS: Simulate TLS fingerprint of the `iOS` browser.
          ANDROID: Simulate TLS fingerprint of the `Android` browser.
          EDGE: Simulate TLS fingerprint of the `Edge` browser.
          QQ: Simulate TLS fingerprint of the `QQ` browser.
          RANDOM: Rrandomly select one of the `up-to-date` browsers.
          RANDOMIZED: Generate a completely random and unique fingerprint (100% compatible
            with `TLS 1.3` using `X25519`).
