        - STASH
        - CLASH
        - SINGBOX
        - BROWSER
        - BLOCK
        - STATUS_CODE_404
        - STATUS_CODE_451
        - SOCKET_DROP
        description: Type of the response. Determines the type of `response` to be
          returned when the rule is matched.
        member_descriptions:
          XRAY_JSON: Return `subscription` in XRAY-JSON format. (Using `Xray Json`
            template).
          XRAY_BASE64: Return `subscription` in BASE64 encoded string. Compatible
            with most client application with Xray core.
          MIHOMO: Return `subscription` in Mihomo format. (Using `Mihomo` template).
          STASH: Return `subscription` in Stash format. (Using `Stash` template).
          CLASH: Return `subscription` in Clash format. (Using `Clash` template) Useful
            for client application that use Legacy Clash core.
          SINGBOX: Return `subscription` in Singbox format. (Using `Singbox` template)
            Format which is used by Singbox client application.
          BROWSER: Return `subscription` as browser format. The same as on `/info`
            route.
          BLOCK: '`Drop` request and return `403` status code.'
          STATUS_CODE_404: '`Drop` request and return `404` status code.'
          STATUS_CODE_451: '`Drop` request and return `451` status code.'
          SOCKET_DROP: '`Drop` the socket connection.'
